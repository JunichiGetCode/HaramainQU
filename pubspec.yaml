name: h_nav
description: "HaramainQu - Pendamping Ibadah Umroh by Haramain Tour"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # HTTP
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.6.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
